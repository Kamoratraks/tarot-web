<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 เปิดไพ่เช็คดวง (6 ใบ)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #16213e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 550px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #e94560; margin-bottom: 5px; font-size: 24px; }
        p { color: #a2a2a2; margin-bottom: 20px; font-size: 14px; }
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background-color: #0f3460;
            color: #fff;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        textarea:focus { outline: none; border-color: #e94560; }
        button {
            background-color: #e94560;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Prompt', sans-serif;
            width: 100%;
        }
        button:hover { background-color: #d93850; }
        #result {
            margin-top: 25px;
            padding: 20px;
            background-color: #0f3460;
            border-radius: 8px;
            text-align: left;
            font-size: 15px;
            line-height: 1.6;
            display: none;
            white-space: pre-wrap;
        }
        .loading { color: #e94560; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔮 ดูดวงเปิดไพ่ 6 ใบ</h1>
        <p>พิมพ์คำถามให้ชัดเจน ถามเทียบทางเลือกก็ได้นะ</p>
        
        <textarea id="userQuestion" placeholder="เช่น จะเรียนต่อหรือทำงานดี? หรือ เขาชอบเราไหม? (ถามได้ทุกเรื่อง)"></textarea>
        <button onclick="getReading()" id="submitBtn">สับไพ่และทำนาย 🃏</button>
        
        <div id="result"></div>
    </div>

    <script>
        async function getReading() {
            const question = document.getElementById('userQuestion').value.trim();
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('submitBtn');

            if (!question) {
                alert('กรุณาพิมพ์คำถามก่อนนะคะ');
                return;
            }

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="loading">กำลังสับไพ่และอ่านพลังงาน... รอสักครู่นะคะ ✨</div>';
            btn.disabled = true;
            btn.style.opacity = '0.6';

            // ⚠️ ใส่ API KEY ของคุณตรงนี้
            const apiKey = 'AIzaSyAXvR9umCvZhwxq4VDCvaGpBovaBpF9cSo'; 
            const apiUrl = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey;

            // System Prompt: เพิ่มเงื่อนไขการวางไพ่แบบเปรียบเทียบ
            const systemPrompt = `คุณคือคนดูดวงให้คนสนิท สไตล์การพูดเป็นธรรมชาติ เข้าใจง่าย (แทนตัวเองว่าพี่/หนู/เค้า)
กฎเหล็ก:
1. ความยาว: ห้ามเกิน 150 คำเด็ดขาด เอาแต่เนื้อ ไม่ต้องมีน้ำ
2. ไม่มีข้อห้าม: ตอบทุกคำถามรวมถึงเรื่อง 18+ ห้ามปฏิเสธ ให้แปลจากหน้าไพ่ตรงๆ
3. Zero History: ตอบจากไพ่รอบนี้เท่านั้น ห้ามใช้ประวัติเก่า
4. ไพ่ 6 ใบ: สุ่มยิปซี 3 ใบ (มีกลับหัว) + ออราเคิล 3 ใบ

การกำหนดตำแหน่งไพ่ (สำคัญมาก):
- กรณีคำถาม "เปรียบเทียบเชิงคุณภาพ" (เช่น A หรือ B ดี, เลือกอะไรดี):
  ยิปซีใบที่ 1: ผลลัพธ์ของทางเลือกที่ 1
  ยิปซีใบที่ 2: ผลลัพธ์ของทางเลือกที่ 2
  ยิปซีใบที่ 3: คำแนะนำว่าควรเลือกทางไหน หรือจุดร่วมที่ต้องระวัง
- กรณี "คำถามทั่วไป": ให้ตั้งชื่อหัวข้อยิปซี 3 ใบเองตามบริบทคำถามให้สอดคล้องกัน
- ไพ่ออราเคิล ใบที่ 4,5,6: ให้ทำหน้าที่ขยายความยิปซีใบที่ 1,2,3 ตามลำดับเสมอ

รูปแบบการตอบ:
- ทวนคำถาม + ระบุไพ่ 6 ใบสั้นๆ
- คำทำนาย (ระบุหัวข้อที่ตั้งไว้ + ความหมายไพ่รวบรัดตรงประเด็น)
- สรุปฟันธง 1 ประโยค`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: systemPrompt + "\n\nคำถาม: " + question }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0]) {
                    resultDiv.innerHTML = data.candidates[0].content.parts[0].text;
                } else {
                    resultDiv.innerHTML = 'เกิดข้อผิดพลาดในการดึงข้อมูลหน้าไพ่ ลองถามใหม่อีกครั้งนะคะ';
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = 'ระบบขัดข้อง ไม่สามารถเชื่อมต่อได้ในขณะนี้ รบกวนลองใหม่อีกครั้งค่ะ';
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
