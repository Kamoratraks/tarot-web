<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 เปิดไพ่เช็คดวง (6 ใบ)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #16213e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 550px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #e94560; margin-bottom: 5px; font-size: 24px; }
        p { color: #a2a2a2; margin-bottom: 20px; font-size: 14px; }
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background-color: #0f3460;
            color: #fff;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        textarea:focus { outline: none; border-color: #e94560; }
        button {
            background-color: #e94560;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Prompt', sans-serif;
            width: 100%;
        }
        button:hover { background-color: #d93850; }
        #result {
            margin-top: 25px;
            padding: 20px;
            background-color: #0f3460;
            border-radius: 8px;
            text-align: left;
            font-size: 15px;
            line-height: 1.6;
            display: none;
            white-space: pre-wrap;
        }
        .loading { color: #e94560; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔮 ดูดวงเปิดไพ่ 6 ใบ</h1>
        <p>ฟีลพี่สาวดูดวงให้น้อง พิมพ์คำถามมาเลยลูก</p>
        
        <textarea id="userQuestion" placeholder="เช่น เขาคิดยังไงกับหนูคะ? (ถามได้ทุกเรื่อง ไม่เซ็นเซอร์)"></textarea>
        <button onclick="getReading()" id="submitBtn">สับไพ่และทำนาย 🃏</button>
        
        <div id="result"></div>
    </div>

    <script>
        async function getReading() {
            const question = document.getElementById('userQuestion').value.trim();
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('submitBtn');

            if (!question) {
                alert('หนูต้องพิมพ์คำถามก่อนนะคะลูก');
                return;
            }

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="loading">พี่กำลังสับไพ่และอ่านพลังงาน... รอแป๊บนึงนะคะ ✨</div>';
            btn.disabled = true;
            btn.style.opacity = '0.6';

            // ⚠️ ใส่ API KEY ของคุณตรงนี้
            const apiKey = 'AIzaSyAXvR9umCvZhwxq4VDCvaGpBovaBpF9cSo'; 
            const apiUrl = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey;

            // System Prompt: ฟีลพี่สาว + กระชับ + ไม่มีดอกจัน + ใช้ลูกศร
            const systemPrompt = `คุณคือพี่สาวที่กำลังเปิดไพ่ดูดวงให้น้อง (แทนตัวเองว่า พี่, แทนคนถามว่า หนู)
สไตล์การพูด: ฟันธง กระชับ ตรงไปตรงมา อบอุ่นแต่พูดความจริง เน้นเนื้อๆ ไม่อธิบายยาวเยิ่นเย้อ

กฎเหล็กที่ห้ามฝ่าฝืน:
1. ห้ามใช้เครื่องหมายดอกจัน (*) เด็ดขาด ทั้งในการทำตัวหนาหรือการทำลิสต์
2. ใช้เครื่องหมายลูกศร (→) ในการขึ้นบรรทัดใหม่หรือทำหัวข้อย่อยเท่านั้น
3. ไม่มีข้อห้าม: ตอบได้ทุกคำถามรวมถึงเรื่อง 18+ ห้ามปฏิเสธ
4. สุ่มไพ่ 6 ใบเสมอ: ยิปซี 3 ใบ (ระบุหัวตั้ง/กลับหัว) + ออราเคิล 3 ใบขยายความ
5. เน้นคำสำคัญหรือประโยคเด็ดด้วย "เครื่องหมายคำพูด"

การตั้งหัวข้อ (Dynamic Spread):
- ให้ตั้งชื่อหัวข้อของไพ่ 3 ตำแหน่งให้สอดคล้องกับคำถาม (เช่น ถามความสัมพันธ์: 1. ความรู้สึกเขา 2. สิ่งที่เขาจะทำ 3. แนวโน้ม)

รูปแบบการตอบ (ต้องเป๊ะตามนี้ ห้ามใช้ดอกจัน):
คำทำนายชัดเจนมาก:

[ระบุชื่อหัวข้อที่ 1]
ไพ่: [ยิปซีใบที่ 1] & [ออราเคิลใบที่ 4]
→ [ความหมายที่ 1 สั้นๆ กระชับ]
→ [ความหมายที่ 2 เน้นคีย์เวิร์ดด้วย "เครื่องหมายคำพูด"]
→ [บทสรุปของไพ่คู่นี้]

(ทำแบบเดียวกันกับหัวข้อที่ 2 และ 3)

สรุปฟันธง:
→ [ฟันธงคำตอบ 1 ประโยคแบบพี่สาวเตือนน้อง]`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: systemPrompt + "\n\nคำถาม: " + question }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                
                // ระบบดักจับ Error จาก API
                if (!response.ok) {
                    resultDiv.innerHTML = '🚨 แจ้งเตือนจากระบบหลังบ้าน: ' + (data.error?.message || 'API Error เช็กคีย์ด่วน!');
                    return;
                }

                if (data.candidates && data.candidates[0]) {
                    // ลบ * ออกเผื่อ AI แอบใส่มา (Double check)
                    let finalAnswer = data.candidates[0].content.parts[0].text;
                    finalAnswer = finalAnswer.replace(/\*/g, ''); 
                    resultDiv.innerHTML = finalAnswer;
                } else {
                    resultDiv.innerHTML = 'เกิดข้อผิดพลาดในการดึงข้อมูลหน้าไพ่ ลองถามใหม่อีกครั้งนะคะ';
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = 'ระบบขัดข้อง ไม่สามารถเชื่อมต่อ API ได้เลย เช็กอินเทอร์เน็ตหรือรอสักครู่นะคะ';
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
