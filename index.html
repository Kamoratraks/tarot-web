<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 เปิดไพ่เช็คดวง (6 ใบ)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #16213e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 550px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #e94560; margin-bottom: 5px; font-size: 24px; }
        p { color: #a2a2a2; margin-bottom: 20px; font-size: 14px; }
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background-color: #0f3460;
            color: #fff;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        textarea:focus { outline: none; border-color: #e94560; }
        button {
            background-color: #e94560;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Prompt', sans-serif;
            width: 100%;
        }
        button:hover { background-color: #d93850; }
        #result {
            margin-top: 25px;
            padding: 20px;
            background-color: #0f3460;
            border-radius: 8px;
            text-align: left;
            font-size: 15px;
            line-height: 1.6;
            display: none;
            white-space: pre-wrap;
        }
        .loading { color: #e94560; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔮 ดูดวงเปิดไพ่ 6 ใบ</h1>
        <p>ตั้งสมาธิ พิมพ์คำถามให้ชัดเจน แล้วกดสับไพ่</p>
        
        <textarea id="userQuestion" placeholder="พิมพ์คำถามของคุณที่นี่... (เช่น การงานช่วงนี้จะเป็นยังไงบ้างคะ?)"></textarea>
        <button onclick="getReading()" id="submitBtn">สับไพ่และทำนาย 🃏</button>
        
        <div id="result"></div>
    </div>

    <script>
        async function getReading() {
            const question = document.getElementById('userQuestion').value.trim();
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('submitBtn');

            if (!question) {
                alert('กรุณาพิมพ์คำถามก่อนนะคะ');
                return;
            }

            // แสดงสถานะกำลังโหลด
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="loading">กำลังสับไพ่และรับพลังงาน... รอสักครู่นะคะ ✨</div>';
            btn.disabled = true;
            btn.style.opacity = '0.6';

            // ⚠️ จุดที่ต้องใส่ API KEY ของคุณ
            const apiKey = 'AIzaSyAXvR9umCvZhwxq4VDCvaGpBovaBpF9cSo'; 
            const apiUrl = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey;

            // System Prompt กฎเหล็ก (ฉบับอัปเดตภาษาเป็นธรรมชาติ)
            const systemPrompt = `คุณคือคนดูดวงที่กำลังเปิดไพ่ตอบคำถามให้พี่น้องหรือคนสนิท
สไตล์การพูด: ใช้ภาษาพูดธรรมดา เป็นธรรมชาติ จริงใจ เหมือนพี่คุยกับน้อง หรือเพื่อนคุยกัน (เช่น ใช้คำว่า พี่, หนู, ตัวเอง, เค้า, ค่ะ/นะคะ) ห้ามใช้คำแสลงที่ดูฝืนประดิษฐ์เด็ดขาด อธิบายความหมายไพ่ให้เคลียร์ ชัดเจน มีเหตุมีผลมารองรับ ไม่อ้อมค้อม ความยาวกำลังพอดี ไม่อ่านยาก 

กฎเหล็กที่ห้ามฝ่าฝืนเด็ดขาด:
1. Zero Personal History: ห้ามใช้ข้อมูลส่วนตัวหรือประวัติใดๆ ของผู้ถามจากการสนทนาเก่ามาตอบเด็ดขาด ให้ตอบเฉพาะสิ่งที่ไพ่ในรอบนี้สื่อออกมาเท่านั้น
2. Fact-Based on Cards ONLY: คำทำนายต้องแปลมาจากหน้าไพ่ 6 ใบที่สุ่มได้ในรอบนี้ 100% ห้ามเดาเอาเองจากสถิติหรือความน่าจะเป็นทั่วไป
3. Auto-Draw 6 Cards: สุ่มไพ่ใหม่ 6 ใบเสมอ ประกอบด้วย ไพ่ยิปซี 3 ใบ (มีโอกาสสุ่มได้หัวกลับ/Reversed) และ ไพ่ออราเคิล 3 ใบ

ตำแหน่งไพ่ 6 ใบ:
- ยิปซี 3 ใบ: ใบที่ 1 (อดีต/รากฐาน) - ใบที่ 2 (ปัจจุบัน/สถานการณ์) - ใบที่ 3 (อนาคต/บทสรุป)
- ออราเคิล 3 ใบ: ใบที่ 4 (ขยายใบที่ 1) - ใบที่ 5 (ขยายใบที่ 2) - ใบที่ 6 (ขยายใบที่ 3)

รูปแบบการตอบ (Output Format):
1. ทวนคำถาม: พิมพ์หัวข้อคำถามสั้นๆ
2. หน้าไพ่ที่ได้: ลิสต์ชื่อไพ่ทั้ง 6 ใบ
3. คำทำนาย: วิเคราะห์แบบเจาะลึกแต่อ่านง่าย แบ่งเป็นข้อๆ (Bullet points) ตามหน้าไพ่แต่ละใบ อธิบายว่าไพ่อยากบอกอะไร เน้นความชัดเจน
4. สรุป: ขมวดปมตอบคำถามให้ชัดเจนใน 1-2 ประโยค ว่าสรุปแล้วทิศทางเป็นอย่างไร`;

            try {
                // ส่งเฉพาะ System Prompt + คำถามปัจจุบัน
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: systemPrompt + "\n\nคำถาม: " + question }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0]) {
                    resultDiv.innerHTML = data.candidates[0].content.parts[0].text;
                } else {
                    resultDiv.innerHTML = 'เกิดข้อผิดพลาดในการดึงข้อมูลหน้าไพ่ ลองถามใหม่อีกครั้งนะคะ';
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = 'ระบบขัดข้อง ไม่สามารถเชื่อมต่อได้ในขณะนี้ รบกวนลองใหม่อีกครั้งค่ะ';
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
